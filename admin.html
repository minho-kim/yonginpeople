<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>시민공론장 히스토리 관리자</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="./admin.css">
  </head>
  <body>
    <header class="admin-topbar">
      <div class="container-fluid">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>
            <p class="admin-kicker mb-1">Timeline Admin</p>
            <h1 class="admin-title mb-0">시민공론장 히스토리 관리자</h1>
          </div>
          <div class="d-flex flex-wrap align-items-center gap-2">
            <a class="btn btn-outline-secondary btn-sm icon-button" href="./index.html">
              <i data-lucide="external-link" aria-hidden="true"></i>
              <span>공개 화면</span>
            </a>
            <button id="logoutButton" class="btn btn-outline-danger btn-sm icon-button d-none" type="button">
              <i data-lucide="log-out" aria-hidden="true"></i>
              <span>로그아웃</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="container-fluid admin-shell">
      <div id="adminStatus" class="admin-status" role="status" aria-live="polite"></div>

      <section id="configNotice" class="admin-panel d-none">
        <h2 class="panel-title">Supabase 설정 필요</h2>
        <p class="panel-copy mb-0">config.js의 anonKey에 Supabase Publishable key 또는 legacy anon public key를 입력해야 관리자 페이지를 사용할 수 있습니다.</p>
      </section>

      <section id="authSection" class="auth-layout">
        <form id="loginForm" class="admin-panel auth-panel">
          <h2 class="panel-title">관리자 로그인</h2>
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="loginEmail">이메일</label>
              <input id="loginEmail" class="form-control" type="email" autocomplete="email" required>
            </div>
            <div class="col-12">
              <label class="form-label" for="loginPassword">비밀번호</label>
              <input id="loginPassword" class="form-control" type="password" autocomplete="current-password" required>
            </div>
            <div class="col-12">
              <button id="loginButton" class="btn btn-primary icon-button w-100" type="submit">
                <i data-lucide="log-in" aria-hidden="true"></i>
                <span>로그인</span>
              </button>
            </div>
          </div>
        </form>
      </section>

      <section id="adminSection" class="d-none">
        <div class="row g-3 align-items-start">
          <aside class="col-12 col-lg-4">
            <div class="admin-panel list-panel">
              <div class="panel-toolbar">
                <div>
                  <h2 class="panel-title mb-1">기록 목록</h2>
                  <p id="recordCountText" class="panel-copy mb-0">0개</p>
                </div>
                <div class="d-flex gap-2">
                  <button id="newRecordButton" class="btn btn-outline-primary btn-sm icon-only" type="button" aria-label="새 기록">
                    <i data-lucide="plus" aria-hidden="true"></i>
                  </button>
                  <button id="refreshButton" class="btn btn-outline-secondary btn-sm icon-only" type="button" aria-label="새로고침">
                    <i data-lucide="refresh-cw" aria-hidden="true"></i>
                  </button>
                </div>
              </div>
              <div id="recordList" class="record-list"></div>
            </div>
          </aside>

          <section class="col-12 col-lg-8">
            <form id="timelineForm" class="admin-panel edit-panel">
              <div class="panel-toolbar">
                <div>
                  <h2 id="formTitle" class="panel-title mb-1">새 기록</h2>
                  <p id="formSubtitle" class="panel-copy mb-0">저장 전</p>
                </div>
                <div class="d-flex flex-wrap gap-2">
                  <button id="deleteButton" class="btn btn-outline-danger btn-sm icon-button d-none" type="button">
                    <i data-lucide="trash-2" aria-hidden="true"></i>
                    <span>삭제</span>
                  </button>
                  <button id="saveButton" class="btn btn-primary btn-sm icon-button" type="submit">
                    <i data-lucide="save" aria-hidden="true"></i>
                    <span>저장</span>
                  </button>
                </div>
              </div>

              <input id="recordId" type="hidden">

              <div class="row g-3">
                <div class="col-12 col-md-8">
                  <label class="form-label" for="eventDate">날짜</label>
                  <input id="eventDate" class="form-control" type="date" required>
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label" for="badgeColor">배지 색상</label>
                  <select id="badgeColor" class="form-select">
                    <option value="primary">primary</option>
                    <option value="secondary">secondary</option>
                    <option value="success">success</option>
                    <option value="info">info</option>
                    <option value="dark">dark</option>
                    <option value="warning">warning</option>
                  </select>
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label" for="badgeText">배지</label>
                  <input id="badgeText" class="form-control" type="text" maxlength="30" required>
                </div>
                <div class="col-12 col-md-8">
                  <label class="form-label" for="eventTitle">제목</label>
                  <input id="eventTitle" class="form-control" type="text" maxlength="255" required>
                </div>
                <div class="col-12">
                  <label class="form-label" for="description">상세 설명</label>
                  <textarea id="description" class="form-control" rows="6"></textarea>
                </div>
                <div class="col-12">
                  <label class="form-label" for="imageUrl">사진 URL</label>
                  <div class="input-group">
                    <input id="imageUrl" class="form-control" type="url">
                    <button id="clearImageButton" class="btn btn-outline-secondary icon-only" type="button" aria-label="사진 URL 비우기">
                      <i data-lucide="x" aria-hidden="true"></i>
                    </button>
                  </div>
                </div>
                <div class="col-12">
                  <label class="form-label" for="imageFile">사진 업로드</label>
                  <div class="input-group">
                    <input id="imageFile" class="form-control" type="file" accept="image/*">
                    <button id="uploadImageButton" class="btn btn-outline-primary icon-button" type="button">
                      <i data-lucide="upload" aria-hidden="true"></i>
                      <span>업로드</span>
                    </button>
                  </div>
                </div>
                <div class="col-12">
                  <div id="imagePreviewWrap" class="image-preview-wrap d-none">
                    <img id="imagePreview" class="image-preview" alt="업로드된 행사 사진 미리보기">
                  </div>
                </div>
                <div class="col-12">
                  <div class="article-header">
                    <label class="form-label mb-0">관련 기사</label>
                    <button id="addArticleButton" class="btn btn-outline-secondary btn-sm icon-button" type="button">
                      <i data-lucide="plus" aria-hidden="true"></i>
                      <span>기사 추가</span>
                    </button>
                  </div>
                  <div id="articleRows" class="article-rows"></div>
                </div>
              </div>
            </form>
          </section>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script type="module" src="./admin.js"></script>
  </body>
</html>
